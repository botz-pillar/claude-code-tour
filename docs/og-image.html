<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>NewClauder · OG social preview · 1280×640</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #000; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; }

    .og {
      width: 1280px;
      height: 640px;
      background: #0a0612;
      position: relative;
      overflow: hidden;
      color: #f4f0ff;
      display: flex;
      align-items: center;
    }

    /* Ambient glow */
    .og::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 28% 50%, rgba(124,58,237,0.32) 0%, rgba(124,58,237,0.10) 35%, transparent 70%);
      pointer-events: none;
    }

    /* Subtle particles */
    .og .star {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(196,168,255,0.55);
      box-shadow: 0 0 8px rgba(196,168,255,0.55);
    }
    .s1 { left: 14%; top: 18%; }
    .s2 { left: 86%; top: 22%; }
    .s3 { left: 88%; top: 76%; }
    .s4 { left: 12%; top: 82%; }
    .s5 { left: 48%; top: 8%; }
    .s6 { left: 92%; top: 50%; }

    /* Splat (left side) */
    .splat-wrap {
      position: absolute;
      left: 16%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      height: 360px;
    }
    .splat-halo {
      position: absolute;
      inset: -50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.45) 0%, rgba(139,92,246,0.18) 38%, transparent 70%);
      filter: blur(8px);
    }
    .splat {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .arm {
      position: absolute;
      width: 300px;
      height: 52px;
      border-radius: 26px;
      background: linear-gradient(90deg, transparent 0%, #a78bfa 14%, #c4a8ff 50%, #a78bfa 86%, transparent 100%);
      box-shadow: 0 0 36px rgba(196,168,255,0.55);
    }
    .a1 { transform: rotate(0deg); }
    .a2 { transform: rotate(45deg); }
    .a3 { transform: rotate(90deg); }
    .a4 { transform: rotate(135deg); }
    .core {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #e5d8ff 36%, rgba(196,168,255,0.5) 70%, transparent 100%);
      box-shadow: 0 0 48px rgba(255,255,255,0.7);
    }

    /* Text block (right side) */
    .text-block {
      position: absolute;
      left: 42%;
      top: 50%;
      transform: translate(0, -50%);
      max-width: 660px;
      padding-right: 60px;
    }
    .eyebrow {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #a78bfa;
      margin-bottom: 12px;
    }
    .brand {
      font-size: 112px;
      font-weight: 900;
      letter-spacing: -0.025em;
      line-height: 0.95;
      margin: 0 0 18px;
      color: #f4f0ff;
    }
    .tagline {
      font-size: 30px;
      font-weight: 500;
      color: #a89bc4;
      line-height: 1.3;
      margin: 0 0 22px;
      max-width: 580px;
    }
    .url {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 22px;
      font-weight: 500;
      color: #c4a8ff;
      letter-spacing: 0.01em;
    }
    .url::before {
      content: '↳ ';
      color: #7c3aed;
    }
  </style>
</head>
<body>
  <div class="og">
    <span class="star s1"></span>
    <span class="star s2"></span>
    <span class="star s3"></span>
    <span class="star s4"></span>
    <span class="star s5"></span>
    <span class="star s6"></span>

    <div class="splat-wrap">
      <div class="splat-halo"></div>
      <div class="splat">
        <div class="arm a1"></div>
        <div class="arm a2"></div>
        <div class="arm a3"></div>
        <div class="arm a4"></div>
        <div class="core"></div>
      </div>
    </div>

    <div class="text-block">
      <div class="eyebrow">For Claude Code</div>
      <h1 class="brand">NewClauder</h1>
      <p class="tagline">A friendly Claude Code onboarding tour for IT and InfoSec folks new to AI agents.</p>
      <div class="url">github.com/botz-pillar/NewClauder</div>
    </div>
  </div>
</body>
</html>
